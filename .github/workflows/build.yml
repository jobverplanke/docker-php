name: Build

on:
  push:
    branches:
      - main
    paths:
      - '8.5/**'
      - '.github/workflows/build.yml'
  workflow_dispatch:

# Least privilege: the default token can only read the repo; the build job
# additionally gets packages:write below. No PAT needed.
permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        php: ['8.5']
        type: ['fpm', 'cli']
        env: ['production', 'dev']

    name: Build PHP ${{ matrix.php }}-${{ matrix.type }}-${{ matrix.env }} Alpine

    # All actions are pinned to commit SHAs (supply-chain hardening); the
    # trailing comment documents the human-readable version.
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0

      - name: Login to GitHub Container Registry
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build for scanning (not pushed)
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: ./${{ matrix.php }}
          file: ./${{ matrix.php }}/${{ matrix.type }}/Dockerfile
          target: ${{ matrix.env }}
          load: true
          tags: scan-target:${{ matrix.php }}-${{ matrix.type }}-${{ matrix.env }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Scan for vulnerabilities (gate - fails on HIGH/CRITICAL)
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          image-ref: scan-target:${{ matrix.php }}-${{ matrix.type }}-${{ matrix.env }}
          scanners: vuln
          severity: HIGH,CRITICAL
          exit-code: '1'
          ignore-unfixed: true

      - name: Push with provenance and SBOM
        id: docker_build
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: ./${{ matrix.php }}
          file: ./${{ matrix.php }}/${{ matrix.type }}/Dockerfile
          target: ${{ matrix.env }}
          push: true
          provenance: mode=max
          sbom: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/php:${{ matrix.php }}-${{ matrix.type }}${{ matrix.env == 'dev' && '-dev' || '' }}
          cache-from: type=gha

      - name: Image digest
        run: echo ${{ steps.docker_build.outputs.digest }}
