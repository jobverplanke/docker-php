; Environment-neutral base settings, loaded as the main php.ini.
; Environment-specific limits live in config/{dev,prod}/php.ini
; and are loaded later via conf.d/zz-90-php.ini.
[PHP]
expose_php=off
log_errors=on
error_reporting=E_ALL
output_buffering=4096
register_argc_argv=off
variables_order="EGPCS"
post_max_size=50M
upload_max_filesize=30M
error_log=/dev/stderr
date.timezone="Europe/Amsterdam"

; Classic fpm hardening: never guess which script to execute when the
; webserver passes a path like /uploads/image.jpg/x.php (default is 1!).
cgi.fix_pathinfo=0
