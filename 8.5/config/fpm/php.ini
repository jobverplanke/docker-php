; FPM-specific overrides, loaded after the environment overlays (zz-90..92)
; so they apply to both dev and production web workers. memory_limit lives
; in the shared env overlays (256M for both variants); this file only holds
; what genuinely differs for web workers.
[PHP]
; JIT off for web workers: typical Laravel requests are IO-bound and gain
; little, while the JIT buffer costs 100M of shared memory per pod (and
; xdebug disables the JIT in dev anyway). Setting the buffer to 0 disables
; the JIT entirely and frees that memory.
opcache.jit_buffer_size=0
