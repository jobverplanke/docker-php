; Kubernetes-tuned pool config (k3s on Raspberry Pi's): static process
; model sized for a 512Mi pod limit; scaling happens with replicas/HPA.
; Override per deployment by mounting a ConfigMap as
; /usr/local/etc/php-fpm.d/zz-pool.conf (last file loaded wins).

[global]
; If workers keep crashing, the pod is the unit of recovery, not the
; fpm master: fail fast and let Kubernetes restart the pod.
emergency_restart_threshold = 10
emergency_restart_interval = 1m
; Give workers time to finish in-flight requests on a stop signal.
; Kubernetes sends SIGTERM (abrupt for php-fpm); add a preStop hook that
; sends SIGQUIT (kill -QUIT 1) for a graceful stop within this window.
process_control_timeout = 10s

[www]
listen = 9000

; --- Process model ---------------------------------------------------
; static: predictable memory within the pod limit; dynamic is designed
; for big shared servers and only adds OOM risk and fork overhead here.
pm = static
pm.max_children = 4
; Recycle workers periodically to bound slow memory leaks.
pm.max_requests = 500

; --- Sizing (per pod) --------------------------------------------------
; pod_limit >= opcache shm (memory_consumption + jit_buffer_size)
;            + pm.max_children x actual worker RSS (~60-80MB for Laravel)
; The default above fits a 512Mi pod limit.
;   512Mi -> 4 workers | 1Gi -> 8-10 | 2Gi -> 16-20
; Bigger pod? Override pm.max_children via a ConfigMap mounted as
; /usr/local/etc/php-fpm.d/zz-pool.conf (last file loaded wins) instead
; of forking this file.

; --- Health & observability --------------------------------------------
; Status page on its own listener: never reachable through the app port,
; still available to probes and a php-fpm exporter inside the pod.
pm.status_listen = 127.0.0.1:9001
pm.status_path = /status
ping.path = /ping

access.log = /proc/self/fd/2
; JSON lines: directly parseable in Loki/Grafana with `| json`, no regex
; needed. Adds PHP-specific fields (duration, peak memory, cpu) that the
; nginx access log does not have.
access.format = '{"source":"php-fpm","time":"%t","remote_ip":"%R","method":"%m","uri":"%r%Q%q","status":%s,"duration_s":%{seconds}d,"mem_mb":%{megabytes}M,"cpu_pct":%C}'
catch_workers_output = yes
decorate_workers_output = no

; Kill threshold for requests; keep <= your ingress timeout.
request_terminate_timeout = 60s
; Log slow requests (with stack trace) well before they get killed.
request_slowlog_timeout = 10s
slowlog = /proc/self/fd/2

; Laravel reads its configuration from env vars (Kubernetes env/secrets).
clear_env = no

; user/group are intentionally not set: the image runs php-fpm entirely
; as www-data via USER in the Dockerfile.
