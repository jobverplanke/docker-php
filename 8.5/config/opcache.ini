; Version-specific opcache base for PHP 8.5 (opcache itself is statically
; compiled into PHP >= 8.5). Environment-specific settings (validate_timestamps,
; revalidate_freq) live in config/{dev,prod}/opcache.ini.
[opcache]
; Enable/disable OPCache.
opcache.enable=1

; https://stitcher.io/blog/php-8-jit-setup
; Enable JIT by setting 'jit_buffer_size' and 'opcache.jit'
; Note: the fpm variant disables the JIT again (config/fpm/php.ini, web
; requests are IO-bound) and xdebug (dev images) disables it at runtime.
opcache.jit_buffer_size=100M

; https://wiki.php.net/rfc/jit#phpini_defaults
opcache.jit=1255

; Controls how many PHP files, at most, can be held in memory at once.
; It's important that the codebase has LESS FILES than whatever you set this at.
; Otherwise increase it. A Laravel app + vendor easily exceeds 20k files,
; so use the next internal prime bucket up from that.
opcache.max_accelerated_files=32531

; The size of the shared memory storage used by OPcache, in megabytes.
opcache.memory_consumption=192

; PHP uses a technique called string interning to improve performance.
; The interned strings buffer is shared across ALL php-fpm processes.
opcache.interned_strings_buffer=12
